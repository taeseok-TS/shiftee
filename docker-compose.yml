# ─────────────────────────────────────────────────────────────
# 큐브티(Cubetee) 단일 VPS 배포 - docker compose
# 웹(Next.js) + PostgreSQL. 실제 값은 .env 파일에서 주입.
# ─────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 를 .env 에 설정하세요}
      POSTGRES_DB: ${POSTGRES_DB:-shiftee}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shiftee}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 는 빌드 시점에 클라이언트 번들로 인라인됨
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-shiftee}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 를 .env 에 설정하세요}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      FONT_PATH: /usr/share/fonts/truetype/nanum/NanumGothic.ttf
      # SMTP(이메일 발송)를 쓰는 경우 아래 주석 해제
      # SMTP_HOST: ${SMTP_HOST}
      # SMTP_PORT: ${SMTP_PORT}
      # SMTP_USER: ${SMTP_USER}
      # SMTP_PASS: ${SMTP_PASS}
    ports:
      - "3000:3000"
    volumes:
      # 업로드 파일(계약서/서명/템플릿)은 컨테이너 재생성에도 보존
      - uploads:/app/apps/web/uploads

volumes:
  pgdata:
  uploads:
